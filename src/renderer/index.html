<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Me - Writing App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
  <style>
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          vertical-align: middle;
      }
  </style>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      const errText = 'GLOBAL ERROR: ' + msg + ' at ' + line + ':' + col + '\n' + (error && error.stack ? error.stack : '');
      if (window.api && window.api.log) window.api.log(errText);
    };
    window.addEventListener('unhandledrejection', function(event) {
      if (window.api && window.api.log) window.api.log('GLOBAL PROMISE REJECTION: ' + event.reason);
    });
  </script>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md overflow-hidden antialiased">
  <div id="app" class="h-screen w-screen flex"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
